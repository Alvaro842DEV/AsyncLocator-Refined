name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - if: github.event_name == 'pull_request'
        run: ./gradlew spotlessCheck build --warning-mode all

      - if: github.event_name == 'push'
        run: ./gradlew spotlessCheck

  gametest:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run Fabric game tests
        run: ./gradlew :Fabric:runGametest

      - name: Run NeoForge game tests
        run: ./gradlew :NeoForge:runGametest

      - name: Upload Fabric game test report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fabric-gametest-report
          path: Fabric/build/gametest/junit.xml
          if-no-files-found: ignore
